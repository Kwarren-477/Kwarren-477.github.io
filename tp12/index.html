<!DOCTYPE html>
<html>

<head>
	<!-- meta tags and title -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tiny Project 12: Weather App Revisted</title>
	<link rel="stylesheet" href="styles.css" media="all">
	<script src="scripts.js" defer=""></script>


</head>

<body>

	<main>

		<div id="currentInfo">

			<div id="currentTemp"><span>47</span>*F</div>
			<div id="currentStatus"></div>
		</div>

		<div id="currentHumidity"><span></span>%</div>

		<div id="currentWind">3 mph</div>
	 </div>
		
	<div id="futureInfo">
		
		<div class="futureDay">
		<div class="futureTemp">60*f</div>
		<div class="futureWind">2mph</div>
		<div class="futureStatus">cloudy</div>
		</div>

		<div class="futureDay">
			<div class="futureTemp"><span></span>*f</div>
			<div class="futureWind">5 mph</div>
			<div class="futureStatus">rainy</div>
		</div>

		<div Class="futureDay">
			<div class="futureTemp"><span></span>*f</div>
			<div class="futureWind">1 mph</div>
			<div class="futureStatus"> sunny</div>
		</div>

		<div class="futureDay">
			<div class="futureTemp"><span>60</span>*f</div>
			<div class="futureWind">2 mph</div>
			<div class="futureStatus"> Sunny</div>
	</div>
</div>

	</main>
</body>

</html>
