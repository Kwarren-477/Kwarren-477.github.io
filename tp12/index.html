<!DOCTYPE html>
<html>

<head>
	<!-- meta tags and title -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tiny Project 12: Weather App Revisted</title>
	<link rel="stylesheet" href="styles.css" media="all">
	<script src="scripts.js" defer=""></script>


</head>

<body>

	<main>

		<div id="currentInfo">

			<div id="currentTemp"><span></span>*F</div>
			<div id="currentStatus"></div>
		</div>

		<div id="currentHumidity"><span></span>%</div>

		<div id="currentWind"></div>


		<div id="futureInfo">

			<div class="futureDay">
				<div class="futureTemp"><span>*f</span></div>
				<div class="futureWind"></div>
				<div class="futureStatus"></div>
			</div>

			<div class="futureDay">
				<div class="futureTemp"><span></span>*f</div>
				<div class="futureWind"></div>
				<div class="futureStatus"></div>
			</div>

			<div class="futureDay">
				<div class="futureTemp"><span></span>*f</div>
				<div class="futureWind"></div>
				<div class="futureStatus"> </div>
			</div>

		</div>

	</main>
</body>

</html>
